<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chronicle - Interactive Map</title>

  <!-- Leaflet (CDN) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="section">
        <h3>Chronicle</h3>
        <div class="small">
          Interactive image-map with character routes and dated events.<br/>
          Tip: click an event to center the map and open its popup.
        </div>
      </div>

      <div class="section" id="characterToggles">
        <h3>Characters</h3>
      </div>

      <div class="section">
        <h3>Timeline Filters</h3>
        <div class="filters">
          <label>
            Search (title/summary)
            <input id="filterText" type="text" placeholder="e.g. cult, relic, Trostenwald" />
          </label>

          <div class="row">
            <label>
              Character
              <select id="filterCharacter"></select>
            </label>
            <label>
              Tag
              <select id="filterTag"></select>
            </label>
          </div>

          <div class="row">
            <label>
              From (date)
              <input id="filterFrom" type="date" />
            </label>
            <label>
              To (date)
              <input id="filterTo" type="date" />
            </label>
          </div>

          <div class="row">
            <label>
              Min session
              <input id="filterSessionMin" type="number" min="0" step="1" placeholder="0" />
            </label>
            <label>
              Max session
              <input id="filterSessionMax" type="number" min="0" step="1" placeholder="99" />
            </label>
          </div>

          <button id="resetFilters" class="btn">Reset filters</button>
          <div id="resultsCount" class="muted"></div>
        </div>
      </div>

      <div class="section">
        <h3>Events</h3>
        <ul class="events" id="eventsList"></ul>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Your app -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
